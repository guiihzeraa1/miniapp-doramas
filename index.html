<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App - Dramas</title>
    
    <!-- Script Oficial do Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .app-shell { position: relative; width: 100%; max-width: 480px; height: 100dvh; margin: 0 auto; background: #000; overflow: hidden; }
        @media (min-width: 481px) { .app-shell { box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 90px rgba(0,0,0,0.9); } }
        
        .feed-container { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .video-card { height: 100%; width: 100%; scroll-snap-align: start; position: relative; background-color: #000; overflow: hidden; }
        
        /* ─── PLAYER NATIVO ─── */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Preenche a tela toda igual TikTok */
            background-color: #000;
            outline: none;
        }

        /* ─── OVERLAY NO TOPO DA TELA (Para não brigar com os controles do video) ─── */
        .top-overlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; 
            padding: 20px 15px 40px 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%); 
            pointer-events: none; /* Clicks passam pelo degradê e vão para o video */
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }
        
        .info-title { 
            font-size: clamp(1rem, 4vw, 1.2rem); 
            font-weight: bold; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); 
            width: 65%; 
            line-height: 1.3;
        }

        .episodes-toggle { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.85rem;
            cursor: pointer; 
            backdrop-filter: blur(10px); 
            pointer-events: auto; /* Esse botão pode ser clicado! */
            transition: 0.2s;
        }
        .episodes-toggle:hover { background: rgba(255, 255, 255, 0.2); }

        /* ─── MODAL DE EPISÓDIOS ─── */
        .episodes-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .episodes-modal.active { display: flex; }
        .modal-content { width: 90%; max-height: 80vh; background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.5rem; cursor: pointer; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; overflow-y: auto; scrollbar-width: none; }
        .episodes-grid::-webkit-scrollbar { display: none; }
        .ep-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 12px 0; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; transition: 0.2s; }
        .ep-btn:hover { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div class="app-shell">
        <div id="episodes-modal" class="episodes-modal">
            <div class="modal-content">
                <div class="modal-header"><h3>Episódios</h3><button class="close-btn" onclick="toggleMenu()">✕</button></div>
                <div class="episodes-grid" id="episodes-grid"></div>
            </div>
        </div>
        <div class="feed-container" id="feed"></div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram.WebApp;
            try { tg.ready(); tg.expand(); tg.requestFullscreen(); } catch (e) {}

            const params = new URLSearchParams(window.location.search);
            const tituloSerie = params.get('titulo') ? decodeURIComponent(params.get('titulo')) : 'Série';
            const serverBase = params.get('server') ? decodeURIComponent(params.get('server')) : '';
            const epsComprimidos = params.get('eps');
            const chatIdSerie = params.get('chat_id') || "";
            const accessHashSerie = params.get('access_hash') || "0"; 

            const feedContainer = document.getElementById('feed');
            const epModal = document.getElementById('episodes-modal');
            const epGrid = document.getElementById('episodes-grid');
            let playlist = [];

            window.toggleMenu = function() { epModal.classList.toggle('active'); }

            async function assinarPing(hashUrl, tempoVideo) {
                const buffer = new TextEncoder().encode(hashUrl + tempoVideo);
                const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            if (epsComprimidos) {
                epsComprimidos.split(',').forEach((epItem, index) => {
                    const partes = epItem.split('_');
                    if(partes.length >= 3) {
                        playlist.push({
                            hashSec: partes[1],
                            authUrl: `${serverBase}/autorizar/${partes[0]}?hash=${partes[1]}&chat_id=${chatIdSerie}&access_hash=${accessHashSerie}&exp=${partes[2]}`,
                            streamUrlBase: `${serverBase}/stream/${partes[0]}?chat_id=${chatIdSerie}&access_hash=${accessHashSerie}`,
                            titulo: `${tituloSerie} - Ep ${index + 1}`
                        });
                    }
                });
            }

            playlist.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'ep-btn'; btn.innerText = `${index + 1}`; 
                btn.onclick = () => { epModal.classList.remove('active'); document.getElementById(`card-ep-${index}`).scrollIntoView({ behavior: 'auto' }); };
                epGrid.appendChild(btn);

                const card = document.createElement('div');
                card.className = 'video-card'; card.id = `card-ep-${index}`; card.setAttribute('data-index', index); 
                
                // Agora usamos o Player NATIVO perfeito do navegador
                card.innerHTML = `
                    <video playsinline preload="none" controls controlslist="nodownload"></video>
                    <div class="top-overlay">
                        <div class="info-title">${item.titulo}</div>
                        <button class="episodes-toggle" onclick="toggleMenu()">☰ Episódios</button>
                    </div>
                `;
                feedContainer.appendChild(card);

                const videoObj = card.querySelector('video');
                
                videoObj.addEventListener('play', () => {
                    clearInterval(videoObj.heartbeatInterval); 
                    videoObj.heartbeatInterval = setInterval(async () => {
                        if (videoObj.paused || videoObj.readyState === 0) return;
                        const tempo = Math.floor(videoObj.currentTime);
                        const token = await assinarPing(item.hashSec, tempo);
                        fetch(`${serverBase}/ping?hash=${item.hashSec}&time=${tempo}&token=${token}`, { method: 'GET', mode: 'no-cors' }).catch(()=>{});
                    }, 10000); 
                });
                
                videoObj.addEventListener('pause', () => clearInterval(videoObj.heartbeatInterval));
                
                videoObj.addEventListener('ended', () => {
                    clearInterval(videoObj.heartbeatInterval);
                    const proximoCard = document.getElementById(`card-ep-${index + 1}`);
                    if (proximoCard) proximoCard.scrollIntoView({ behavior: 'smooth' });
                });
            });

            // ─── CARREGAMENTO RÁPIDO CORRIGIDO (SEM BAGUNÇA NA REDE) ───
            async function carregarVideoComSeguranca(videoElement, itemData) {
                if (videoElement.isFetchingAuth) return; 

                if (!videoElement.getAttribute('src')) {
                    videoElement.isFetchingAuth = true; 
                    try {
                        const res = await fetch(itemData.authUrl);
                        if (res.ok) {
                            const tokenDeIP = await res.text();
                            videoElement.setAttribute('src', `${itemData.streamUrlBase}&token=${tokenDeIP}`);
                            videoElement.load();
                        }
                    } catch (error) {
                        console.error("Falha de Handshake:", error);
                    } finally {
                        videoElement.isFetchingAuth = false;
                    }
                }
            }

            function getIndexVisivelAtual() {
                let v = 0; 
                document.querySelectorAll('.video-card').forEach(c => { 
                    const r = c.getBoundingClientRect(); 
                    // Se o topo do card estiver dentro da tela
                    if(r.top >= -100 && r.top <= window.innerHeight/2) v = parseInt(c.getAttribute('data-index')); 
                });
                return v;
            }

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const cardIndex = parseInt(entry.target.getAttribute('data-index'));
                    const video = entry.target.querySelector('video');
                    if (!video) return;

                    if (entry.isIntersecting) {
                        // Inicia o carregamento com um atraso se o usuario parar no video
                        video.loadTimer = setTimeout(async () => {
                            
                            // 1. Carrega o video visível
                            await carregarVideoComSeguranca(video, playlist[cardIndex]);
                            video.play().catch(() => { /* Autoplay bloqueado pelo celular do usuario, normal. */ });
                            
                            // 2. Prepara silenciosamente APENAS o próximo episódio
                            const proximoCard = document.getElementById(`card-ep-${cardIndex + 1}`);
                            if (proximoCard) {
                                carregarVideoComSeguranca(proximoCard.querySelector('video'), playlist[cardIndex + 1]);
                            }

                        }, 300); // 300ms garante que se ele rolar rapido, nao dispara a rede
                        
                    } else {
                        // Se o vídeo saiu da tela:
                        clearTimeout(video.loadTimer);
                        video.pause();
                        
                        // Limpeza profunda de RAM: Se o vídeo ficou longe da tela, destrói o arquivo
                        const distancia = Math.abs(cardIndex - getIndexVisivelAtual());
                        if (distancia > 1) {
                            if (video.getAttribute('src')) { 
                                video.removeAttribute('src'); 
                                video.load(); 
                                video.isFetchingAuth = false; // Zera a trava de segurança!
                            }
                        }
                    }
                });
            }, { root: feedContainer, threshold: 0.6 });

            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        });
    </script>
</body>
</html>
