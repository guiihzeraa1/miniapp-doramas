<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App - Dramas</title>

    <!-- Script Oficial do Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Video.js v10 (Web Components) Oficial -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body { height: 100%; }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ─── MOLDURA DO APP ─── */
        .app-shell {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh; 
            margin: 0 auto;
            background: #000;
            overflow: hidden;
            border-radius: 0 !important;
        }

        @media (min-width: 481px) {
            .app-shell { box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 0 90px rgba(0, 0, 0, 0.9); }
        }

        /* ─── FEED (SEM BARRA DE ROLAGEM) ─── */
        .feed-container {
            height: 100%;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        .feed-container::-webkit-scrollbar { display: none; }

        .video-card {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background-color: #000;
            overflow: hidden;
            border-radius: 0 !important;
        }

        video-player { 
            display: contents; 
            --media-border-radius: 0px !important;
            --media-control-bar-border-radius: 0px !important;
        }
        
        video-skin { 
            display: block; 
            width: 100%; 
            height: 100%; 
            --media-object-fit: cover; 
            --media-border-radius: 0px !important;
            border-radius: 0 !important; 
        }

        video { 
            width: 100%; 
            height: 100%; 
            pointer-events: auto; 
            border-radius: 0 !important; 
            -webkit-border-radius: 0 !important;
            -moz-border-radius: 0 !important;
            outline: none !important;
        }

        media-controls { position: absolute; inset: 0; pointer-events: none; transition: opacity 0.25s; }
        media-controls:not([data-visible]) { opacity: 0; }

        /* ─── INFORMAÇÕES DA SÉRIE ─── */
        .info-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px; padding-bottom: 90px; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .info-title {
            font-size: clamp(1.1rem, 4vw, 1.3rem); font-weight: bold; margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9); width: 100%;
            line-height: 1.3; text-wrap: balance;
        }

        /* ─── BOTÃO EPISÓDIOS E POPUP ─── */
        .episodes-toggle {
            position: absolute; bottom: 145px; right: 16px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 8px 15px; border-radius: 20px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(10px); pointer-events: auto; 
            transition: 0.2s; z-index: 100;
        }

        .episodes-toggle:hover { background: rgba(255, 255, 255, 0.2); }

        .episodes-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        .episodes-modal.active { display: flex; }

        .modal-content {
            width: 90%; max-height: 80vh; background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
            padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 1.3rem; font-weight: bold; }
        .close-btn { background: none; border: none; color: rgba(255, 255, 255, 0.7); font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .close-btn:hover { color: #fff; }

        .episodes-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px; overflow-y: auto; padding-right: 5px; scrollbar-width: none; -ms-overflow-style: none;
        }
        .episodes-grid::-webkit-scrollbar { display: none; }

        .ep-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15);
            color: white; padding: 12px 0; border-radius: 8px; cursor: pointer;
            font-size: 1rem; font-weight: bold; transition: 0.2s; text-align: center;
        }
        .ep-btn:hover { background: rgba(255, 255, 255, 0.3); }

        /* 🔥 NOVA CLASSE: Marca o episódio atual com a cor solicitada */
        .ep-btn.ativo {
            background: rgb(125 96 255 / 79%);
            border: 1px solid rgba(255, 255, 255, 0.5); /* Borda mais clara para dar destaque */
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <div id="episodes-modal" class="episodes-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Episódios</h3>
                    <button class="close-btn" onclick="toggleMenu()">✕</button>
                </div>
                <div class="episodes-grid" id="episodes-grid"></div>
            </div>
        </div>
        <div class="feed-container" id="feed"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram.WebApp;
            const getBody = function() { return (document.body || document.head || document.documentElement || document.doctype || document); };

            try { tg.ready(); } catch (e) {
                getBody().innerHTML = '<div style="color:#ff5555;background:#000;height:100vh;display:flex;align-items:center;justify-content:center;font-size:1.3rem">Acesse apenas pelo Telegram</div>';
                return;
            }
            try { tg.expand(); tg.requestFullscreen(); } catch (e) {}

            const params = new URLSearchParams(window.location.search);
            const tituloSerie = params.get('titulo') ? decodeURIComponent(params.get('titulo')) : 'Série';
            const serverBase = params.get('server') ? decodeURIComponent(params.get('server')) : '';
            const epsComprimidos = params.get('eps');
            
            const chatIdSerie = params.get('chat_id') || "";
            const accessHashSerie = params.get('access_hash') || "0";
            const userId = params.get('uid') || "Desconhecido"; 

            const feedContainer = document.getElementById('feed');
            const epModal = document.getElementById('episodes-modal');
            const epGrid = document.getElementById('episodes-grid');
            let playlist = [];

            window.toggleMenu = function() { epModal.classList.toggle('active'); }

            if (epsComprimidos) {
                const listaEps = epsComprimidos.split(',');
                listaEps.forEach((epItem, index) => {
                    const partes = epItem.split('_'); 
                    if(partes.length === 3) {
                        playlist.push({
                            authUrl: `${serverBase}/autorizar/${partes[0]}?hash=${partes[1]}&chat_id=${chatIdSerie}&access_hash=${accessHashSerie}&exp=${partes[2]}&uid=${userId}`,
                            streamUrlBase: `${serverBase}/stream/${partes[0]}?chat_id=${chatIdSerie}&access_hash=${accessHashSerie}&uid=${userId}`,
                            titulo: `${tituloSerie} - Ep ${index + 1}`,
                            tokenRecebido: null
                        });
                    }
                });
            }

            // ─── CONSTRUÇÃO DA TELA (DOM) ───
            playlist.forEach((item, index) => {
                // Botões do Modal
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                
                // 🔥 Adiciona a classe 'ativo' apenas no primeiro episódio na inicialização
                if (index === 0) btn.classList.add('ativo');

                btn.innerText = `${index + 1}`; 
                btn.addEventListener('click', () => {
                    epModal.classList.remove('active');
                    document.getElementById(`card-ep-${index}`).scrollIntoView({ behavior: 'auto' });
                });
                epGrid.appendChild(btn);

                // Cartão de Vídeo
                const card = document.createElement('div');
                card.className = 'video-card';
                card.id = `card-ep-${index}`; 
                card.setAttribute('data-index', index); 

                card.innerHTML = `
                    <video-player>
                        <video-skin>
                            <video playsinline muted preload="none"></video>
                            <media-controls>
                                <button class="episodes-toggle" onclick="toggleMenu()">☰ Episódios</button>
                                <div class="info-overlay">
                                    <div class="info-title">${item.titulo}</div>
                                </div>
                            </media-controls>
                        </video-skin>
                    </video-player>
                `;
                feedContainer.appendChild(card);
            });

            // Auto-scroll para o próximo vídeo quando acabar
            document.querySelectorAll('video').forEach((video, index) => {
                video.addEventListener('ended', () => {
                    const proximoIndex = index + 1;
                    if (proximoIndex < playlist.length) {
                        const proximoCard = document.getElementById(`card-ep-${proximoIndex}`);
                        if (proximoCard) proximoCard.scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });

            // ─── CÉREBRO MAESTRO (OBSERVER + HANDSHAKE) ───
            let indexVisivelAtual = 0;
            let playTimer = null; 
            let scrollTimeout = null; 

            const observer = new IntersectionObserver((entries) => {
                let mudou = false;
                entries.forEach(entry => {
                    if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                        indexVisivelAtual = parseInt(entry.target.getAttribute('data-index'));
                        mudou = true;
                    }
                });
                
                if (mudou) {
                    // 🔥 SEGREDO NOVO: Pinta de roxo o botão correspondente e apaga o resto instantaneamente
                    document.querySelectorAll('.ep-btn').forEach((btn, idx) => {
                        if (idx === indexVisivelAtual) {
                            btn.classList.add('ativo');
                        } else {
                            btn.classList.remove('ativo');
                        }
                    });

                    // Sistema de Debounce (Paciência para autorizar no servidor)
                    if (scrollTimeout) clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(() => {
                        sincronizarFilaDeVideos();
                    }, 300); 
                }
            }, { root: feedContainer, threshold: 0.6 });

            async function carregarVideoUnico(videoEl, playlistItem) {
                if (!videoEl || !playlistItem) return;
                if (videoEl.getAttribute('src')) return;

                try {
                    if (!playlistItem.tokenRecebido) {
                        const resposta = await fetch(playlistItem.authUrl);
                        if (!resposta.ok) {
                            console.error("Servidor recusou o acesso", resposta.status);
                            return;
                        }
                        playlistItem.tokenRecebido = await resposta.text();
                    }
                    videoEl.setAttribute('src', `${playlistItem.streamUrlBase}&token=${playlistItem.tokenRecebido}`);
                    videoEl.load();
                } catch (e) {
                    console.log("Falha ao se conectar com o servidor.", e);
                }
            }

            function sincronizarFilaDeVideos() {
                playlist.forEach((item, index) => {
                    const card = document.getElementById(`card-ep-${index}`);
                    if (!card) return;
                    const video = card.querySelector('video');
                    if (!video) return;

                    if (index === indexVisivelAtual) {
                        if (window.playTimer) clearTimeout(window.playTimer);
                        
                        carregarVideoUnico(video, item).then(() => {
                            window.playTimer = setTimeout(() => {
                                video.muted = true;
                                const playPromise = video.play();
                                
                                if (playPromise !== undefined) {
                                    playPromise.then(() => {
                                        setTimeout(() => { video.muted = false; }, 800);
                                    }).catch(err => console.log("O celular bloqueou autoplay no mudo:", err));
                                }
                            }, 400); 
                        });
                        
                    } else if (index === indexVisivelAtual + 1) {
                        video.pause();
                        video.muted = true;
                        carregarVideoUnico(video, item);
                    } else {
                        video.pause();
                        if (video.getAttribute('src')) {
                            video.removeAttribute('src');
                            video.load(); 
                        }
                    }
                });
            }

            // Inicia o observador
            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        });
    </script>
</body>
</html>
