<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App - Dramas</title>
    
    <!-- Script Oficial do Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Video.js v10 (Web Components) Oficial -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ─── CORREÇÃO DEFINITIVA PARA TELA CHEIA MOBILE ─── */
        html, body { 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
        }
        
        .app-shell { 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            background: #000; 
            overflow: hidden; 
        }
        @media (min-width: 481px) { .app-shell { box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 90px rgba(0,0,0,0.9); } }
        
        /* O Flexbox obriga os itens filhos a respeitarem a altura da tela */
        .feed-container { 
            display: flex;
            flex-direction: column;
            height: 100%; 
            width: 100%; 
            overflow-y: auto; 
            scroll-snap-type: y mandatory; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
        }
        .feed-container::-webkit-scrollbar { display: none; }
        
        /* ─── O CADEADO DE ALTURA (Impede a Sanfona) ─── */
        .video-card { 
            flex: 0 0 100%; /* Cada cartão ocupa EXATAMENTE 100% da tela visível */
            height: 100%; 
            width: 100%; 
            scroll-snap-align: start; 
            scroll-snap-stop: always;
            position: relative; 
            background-color: #000; 
            overflow: hidden; 
        }
        
        /* ─── VIDEO.JS FORÇADO A ESTICAR ─── */
        video-player { 
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; 
            height: 100%;
            --media-border-radius: 0px !important;
            --media-control-bar-border-radius: 0px !important;
        }
        
        video-skin { 
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; 
            height: 100%; 
            --media-object-fit: cover; 
            --media-border-radius: 0px !important;
        }

        video { 
            width: 100%; 
            height: 100%; 
            pointer-events: auto; 
            outline: none !important;
            object-fit: cover;
            background-color: #000;
        }

        media-controls { position: absolute; inset: 0; pointer-events: none; transition: opacity 0.25s; }
        media-controls:not([data-visible]) { opacity: 0; }

        /* ─── TÍTULOS E BOTÕES DENTRO DO PLAYER ─── */
        .info-overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 20px 15px;
            padding-bottom: 90px; /* Acima da barra de progresso */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            pointer-events: none;
            z-index: 10;
        }
        
        .info-title {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episodes-toggle {
            position: absolute;
            bottom: 145px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(10px);
            pointer-events: auto; 
            transition: 0.2s;
            z-index: 11;
        }
        .episodes-toggle:hover { background: rgba(255, 255, 255, 0.2); }

        /* ─── MODAL DE EPISÓDIOS ─── */
        .episodes-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .episodes-modal.active { display: flex; }
        .modal-content { width: 90%; max-height: 80vh; background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.5rem; cursor: pointer; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; overflow-y: auto; scrollbar-width: none; }
        .episodes-grid::-webkit-scrollbar { display: none; }
        .ep-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 12px 0; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; transition: 0.2s; }
        .ep-btn:hover { background: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div class="app-shell">
        <div id="episodes-modal" class="episodes-modal">
            <div class="modal-content">
                <div class="modal-header"><h3>Episódios</h3><button class="close-btn" onclick="toggleMenu()">✕</button></div>
                <div class="episodes-grid" id="episodes-grid"></div>
            </div>
        </div>
        <div class="feed-container" id="feed"></div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram.WebApp;
            try { 
                tg.ready(); 
                tg.expand(); 
                tg.requestFullscreen(); 
                tg.disableVerticalSwipes(); // Trava gestos nativos do Telegram que atrapalham o scroll
            } catch (e) {}

            const params = new URLSearchParams(window.location.search);
            const tituloSerie = params.get('titulo') ? decodeURIComponent(params.get('titulo')) : 'Série';
            const serverBase = params.get('server') ? decodeURIComponent(params.get('server')) : '';
            const epsComprimidos = params.get('eps');
            const chatIdSerie = params.get('chat_id') || "";
            const accessHashSerie = params.get('access_hash') || "0"; 
            
            // 🔥 CAPTURAMOS A IDENTIDADE DO USUÁRIO
            const userId = params.get('uid') || "Desconhecido";

            const feedContainer = document.getElementById('feed');
            const epModal = document.getElementById('episodes-modal');
            const epGrid = document.getElementById('episodes-grid');
            let playlist = [];

            window.toggleMenu = function() { epModal.classList.toggle('active'); }

            async function assinarPing(hashUrl, tempoVideo) {
                const buffer = new TextEncoder().encode(hashUrl + tempoVideo);
                const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            if (epsComprimidos) {
                epsComprimidos.split(',').forEach((epItem, index) => {
                    const partes = epItem.split('_');
                    if(partes.length >= 3) {
                        playlist.push({
                            hashSec: partes[1],
                            authUrl: `${serverBase}/autorizar/${partes[0]}?hash=${partes[1]}&chat_id=${chatIdSerie}&access_hash=${accessHashSerie}&exp=${partes[2]}`,
                            streamUrlBase: `${serverBase}/stream/${partes[0]}?chat_id=${chatIdSerie}&access_hash=${accessHashSerie}`,
                            titulo: `${tituloSerie} - Ep ${index + 1}`
                        });
                    }
                });
            }

            playlist.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'ep-btn'; btn.innerText = `${index + 1}`; 
                btn.onclick = () => { epModal.classList.remove('active'); document.getElementById(`card-ep-${index}`).scrollIntoView({ behavior: 'auto' }); };
                epGrid.appendChild(btn);

                const card = document.createElement('div');
                card.className = 'video-card'; card.id = `card-ep-${index}`; card.setAttribute('data-index', index); 
                
                card.innerHTML = `
                    <video-player>
                        <video-skin>
                            <video playsinline preload="none"></video>
                            <media-controls>
                                <button class="episodes-toggle" onclick="toggleMenu()">☰ Episódios</button>
                                <div class="info-overlay">
                                    <div class="info-title">${item.titulo}</div>
                                </div>
                            </media-controls>
                        </video-skin>
                    </video-player>
                `;
                feedContainer.appendChild(card);

                const videoObj = card.querySelector('video');
                
                videoObj.addEventListener('play', () => {
                    clearInterval(videoObj.heartbeatInterval); 
                    videoObj.heartbeatInterval = setInterval(async () => {
                        if (videoObj.paused || videoObj.readyState === 0) return;
                        const tempo = Math.floor(videoObj.currentTime);
                        const token = await assinarPing(item.hashSec, tempo);
                        fetch(`${serverBase}/ping?hash=${item.hashSec}&time=${tempo}&token=${token}`, { method: 'GET', mode: 'no-cors' }).catch(()=>{});
                    }, 10000); 
                });
                
                videoObj.addEventListener('pause', () => clearInterval(videoObj.heartbeatInterval));
                
                videoObj.addEventListener('ended', () => {
                    clearInterval(videoObj.heartbeatInterval);
                    const proximoCard = document.getElementById(`card-ep-${index + 1}`);
                    if (proximoCard) proximoCard.scrollIntoView({ behavior: 'smooth' });
                });
            });

            // ─── CARREGADOR SEGURO E INDIVIDUAL ───
            async function carregarVideoUnico(videoElement, itemData) {
                if (videoElement.isFetchingAuth || videoElement.getAttribute('src')) return; 
                
                videoElement.isFetchingAuth = true; 
                try {
                    const res = await fetch(itemData.authUrl);
                    if (res.ok) {
                        const tokenDeIP = await res.text();
                        videoElement.setAttribute('src', `${itemData.streamUrlBase}&token=${tokenDeIP}`);
                        videoElement.load();
                    }
                } catch (error) {
                    console.error("Erro Handshake", error);
                } finally {
                    videoElement.isFetchingAuth = false;
                }
            }

            // ─── O MAESTRO (GERENCIADOR DE ORDEM E ESTADO) ───
            let debounceTimer;
            let activeIndex = 0;

            function sincronizarFilaDeVideos(indexAtual) {
                document.querySelectorAll('video').forEach((v, i) => {
                    if (i !== indexAtual) v.pause();
                });

                document.querySelectorAll('.video-card').forEach((card, i) => {
                    const v = card.querySelector('video');
                    if (i < indexAtual - 1 || i > indexAtual + 1) {
                        if (v.getAttribute('src')) {
                            v.removeAttribute('src');
                            v.load();
                            v.isFetchingAuth = false; 
                        }
                    }
                });

                const activeCard = document.getElementById(`card-ep-${indexAtual}`);
                if (activeCard) {
                    const activeVideo = activeCard.querySelector('video');
                    carregarVideoUnico(activeVideo, playlist[indexAtual]).then(() => {
                        activeVideo.play().catch(()=>{}); 
                    });
                }

                const nextCard = document.getElementById(`card-ep-${indexAtual + 1}`);
                if (nextCard) {
                    const nextVideo = nextCard.querySelector('video');
                    carregarVideoUnico(nextVideo, playlist[indexAtual + 1]);
                }
            }

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        activeIndex = parseInt(entry.target.getAttribute('data-index'));
                        clearTimeout(debounceTimer);
                        
                        debounceTimer = setTimeout(() => {
                            sincronizarFilaDeVideos(activeIndex);
                        }, 300);
                    }
                });
            }, { root: feedContainer, threshold: 0.6 });

            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
        });
    </script>
</body>
</html>
